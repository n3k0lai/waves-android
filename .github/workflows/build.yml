name: Build & Release APK

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: waves-debug
          path: app/build/outputs/apk/debug/*.apk

  # TODO: release job disabled until signing config is added
  # Needs: generate keystore, add KEYSTORE_BASE64 + KEYSTORE_PASSWORD secrets,
  # add signingConfigs block to app/build.gradle.kts

  # Nightly: build on every push to master, attach to 'nightly' release
  nightly:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: waves-debug
          path: apk/

      - name: Get short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Waves Nightly (${{ steps.sha.outputs.SHORT_SHA }})"
          body: |
            Latest build from `master` (${{ steps.sha.outputs.SHORT_SHA }}).
            **This is a debug build — not optimized or signed for release.**
            Updated automatically on every push.
          files: |
            apk/*.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
